# =============================================================================
# venture-os — Staging Deployment (AWS EKS)
# =============================================================================
# Overlay target: fabric-os/deploy/kubernetes/overlays/staging/venture-os/
# Image: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-venture-os
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: venture-os
  namespace: venture-os-staging
  labels:
    app: venture-os
    tier: frontend
    environment: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: venture-os
      environment: staging
  template:
    metadata:
      labels:
        app: venture-os
        tier: frontend
        environment: staging
    spec:
      serviceAccountName: venture-os-sa
      containers:
        - name: venture-os
          image: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-venture-os:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: DEPLOY_ENV
              value: staging
          envFrom:
            - secretRef:
                name: venture-os-secrets
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: venture-os
  namespace: venture-os-staging
spec:
  selector:
    app: venture-os
    environment: staging
  ports:
    - name: http
      port: 80
      targetPort: http
